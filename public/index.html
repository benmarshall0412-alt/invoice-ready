<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invoice Ready</title>
<style>
body { font-family: Arial, sans-serif; max-width: 760px; margin: 0 auto; padding: 20px; background: #0d1117; color: #e6edf3; }
h1 { color: #58a6ff; }
input, textarea, button, select { padding: 8px; margin: 4px 0; width: 100%; box-sizing: border-box; background:#161b22; color:#e6edf3; border:1px solid #30363d; border-radius:6px; }
button { background:#238636; cursor:pointer; border:none; }
.card { border:1px solid #30363d; border-radius:8px; padding:16px; margin:12px 0; }
.hide { display:none; }
.row { display:flex; gap:8px; }
.link { color:#58a6ff; background:none; width:auto; padding:0; text-decoration:underline; }
</style>
</head>
<body>
<h1 id="brandTitle">Invoice Ready</h1>
<div id="authView">
<div class="card">
<h3>Register your company</h3>
<input id="rCompany" placeholder="Company name">
<input id="rAddress" placeholder="Company address">
<input id="rEmail" placeholder="Email">
<input id="rPass" type="password" placeholder="Password">
<button onclick="register()">Register</button>
</div>
<div class="card">
<h3>Login</h3>
<input id="lEmail" placeholder="Email">
<input id="lPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>
<div id="appView" class="hide">
<button onclick="logout()" class="link">Logout</button>
<div class="card">
<h3>Subcontractors (CIS)</h3>
<input id="cName" placeholder="Subcontractor name">
<input id="cAddress" placeholder="Address">
<input id="cEmail" placeholder="Email">
<input id="cUtr" placeholder="UTR number">
<button onclick="addContractor()">Save subcontractor</button>
<div id="contractorList"></div>
</div>
<div class="card">
<h3>Customers</h3>
<input id="custName" placeholder="Customer name">
<input id="custAddress" placeholder="Address">
<input id="custEmail" placeholder="Email">
<input id="custVat" placeholder="VAT number (optional)">
<button onclick="addCustomer()">Save customer</button>
<div id="customerList"></div>
</div>
<div class="card">
<h3>Create invoice</h3>
<select id="iType" onchange="toggleType()"><option value="standard">Standard invoice (to customer)</option><option value="cis">CIS invoice (subcontractor)</option></select>
<select id="iCustomer"></select>
<select id="iContractor" class="hide"></select>
<input id="iNumber" placeholder="Invoice number e.g. INV-001">
<input id="iDesc" placeholder="Work description">
<div class="row"><input id="iQty" placeholder="Qty" value="1"><input id="iPrice" placeholder="Unit price GBP"></div>
<input id="iVat" placeholder="VAT rate % (e.g. 20)" value="20">
<input id="iCis" class="hide" placeholder="CIS rate % (e.g. 20)" value="20">
<input id="iDue" type="date">
<textarea id="iNotes" placeholder="Notes"></textarea>
<button onclick="createInvoice()">Create invoice</button>
</div>
<div class="card">
<h3>Invoices</h3>
<div id="invList"></div>
</div>
</div>
<script>
let token = localStorage.getItem('ir_token');
function headers() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
async function register() {
const r = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ company: rCompany.value, address: rAddress.value, email: rEmail.value, password: rPass.value }) });
const d = await r.json();
if (d.token) { token = d.token; localStorage.setItem('ir_token', token); show(); } else alert(d.error || 'Error');
}
async function login() {
const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: lEmail.value, password: lPass.value }) });
const d = await r.json();
if (d.token) { token = d.token; localStorage.setItem('ir_token', token); show(); } else alert(d.error || 'Error');
}
function logout() { localStorage.removeItem('ir_token'); token = null; location.reload(); }
function show() { document.getElementById('authView').classList.add('hide'); document.getElementById('appView').classList.remove('hide'); loadContractors(); loadCustomers(); loadInvoices(); }
function toggleType() {
const cis = document.getElementById('iType').value === 'cis';
document.getElementById('iContractor').classList.toggle('hide', !cis);
document.getElementById('iCis').classList.toggle('hide', !cis);
document.getElementById('iCustomer').classList.toggle('hide', cis);
document.getElementById('iVat').classList.toggle('hide', cis);
}
async function loadContractors() {
const r = await fetch('/api/contractors', { headers: headers() });
const list = await r.json();
document.getElementById('iContractor').innerHTML = list.map(c => '<option value="' + c.id + '">' + c.name + '</option>').join('');
document.getElementById('contractorList').innerHTML = list.map(c => '<div>' + c.name + (c.utr ? ' (UTR ' + c.utr + ')' : '') + '</div>').join('');
}
async function addContractor() {
await fetch('/api/contractors', { method:'POST', headers: headers(), body: JSON.stringify({ name: cName.value, address: cAddress.value, email: cEmail.value, utr: cUtr.value }) });
cName.value=''; cAddress.value=''; cEmail.value=''; cUtr.value=''; loadContractors();
}
async function loadCustomers() {
const r = await fetch('/api/customers', { headers: headers() });
const list = await r.json();
document.getElementById('iCustomer').innerHTML = list.map(c => '<option value="' + c.id + '">' + c.name + '</option>').join('');
document.getElementById('customerList').innerHTML = list.map(c => '<div>' + c.name + (c.vatNumber ? ' (VAT ' + c.vatNumber + ')' : '') + '</div>').join('');
}
async function addCustomer() {
await fetch('/api/customers', { method:'POST', headers: headers(), body: JSON.stringify({ name: custName.value, address: custAddress.value, email: custEmail.value, vatNumber: custVat.value }) });
custName.value=''; custAddress.value=''; custEmail.value=''; custVat.value=''; loadCustomers();
}
async function createInvoice() {
const type = document.getElementById('iType').value;
const body = { number: iNumber.value, type, notes: iNotes.value, dueDate: iDue.value || null, items: [{ description: iDesc.value, qty: iQty.value, unitPrice: iPrice.value }] };
if (type === 'cis') { body.contractorId = iContractor.value; body.cisRate = Number(iCis.value); body.vatRate = 0; }
else { body.customerId = iCustomer.value; body.vatRate = Number(iVat.value); body.cisRate = 0; }
await fetch('/api/invoices', { method:'POST', headers: headers(), body: JSON.stringify(body) });
iNumber.value=''; iDesc.value=''; iPrice.value=''; iNotes.value=''; loadInvoices();
}
async function loadInvoices() {
const r = await fetch('/api/invoices', { headers: headers() });
const list = await r.json();
document.getElementById('invList').innerHTML = list.map(function(inv) {
const gross = inv.items.reduce((s,i) => s + i.qty*i.unitPrice, 0);
const cis = inv.type === 'cis' ? gross * (inv.cisRate/100) : 0;
const vat = gross * ((inv.vatRate||0)/100);
const net = gross + vat - cis;
const party = (inv.customer && inv.customer.name) || (inv.contractor && inv.contractor.name) || '-';
let line = '<div class="card"><b>' + inv.number + '</b> [' + inv.type + '] - ' + party + '<br>Subtotal GBP' + gross.toFixed(2);
if (vat) line += ' | VAT GBP' + vat.toFixed(2);
if (cis) line += ' | CIS -GBP' + cis.toFixed(2);
line += ' | Total GBP' + net.toFixed(2) + ' | ' + inv.status;
line += '<br><button class="link" onclick="viewPdf(&#39;' + inv.id + '&#39;)">View PDF</button> ';
line += '<button onclick="sendInvoice(&#39;' + inv.id + '&#39;)">Email</button> ';
line += '<button onclick="deleteInvoice(&#39;' + inv.id + '&#39;)">Delete</button></div>';
return line;
}).join('');
}
async function viewPdf(id) {
const r = await fetch('/api/invoices/' + id + '/pdf', { headers: { 'Authorization': 'Bearer ' + token } });
if (!r.ok) { alert('Could not load PDF.'); return; }
const blob = await r.blob();
const url = URL.createObjectURL(blob);
window.open(url, '_blank');
setTimeout(() => URL.revokeObjectURL(url), 60000);
}
async function sendInvoice(id) {
const to = prompt('Send invoice to email address:');
if (!to) return;
const r = await fetch('/api/invoices/' + id + '/send', { method:'POST', headers: headers(), body: JSON.stringify({ to: to }) });
if (r.ok) { alert('Invoice sent.'); loadInvoices(); } else alert('Send failed - check SMTP settings.');
}
async function deleteInvoice(id) {
if (!confirm('Delete this invoice?')) return;
await fetch('/api/invoices/' + id, { method:'DELETE', headers: headers() });
loadInvoices();
}
if (token) show();
</script>
</body>
</html>
